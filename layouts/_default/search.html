{{ define "main" }}
<link href="{{ "pagefind/pagefind-ui.css" | relURL }}" rel="stylesheet">

{{- /* 左欄 filter slot：桌面寬時用 JS 把 pagefind 的 filter-panel 搬進來。
       在手機 / 桌面窄視窗都隱藏；filter 維持在 pagefind 的 drawer 原位。 */ -}}
<aside class="search-filter-slot" aria-label="篩選條件"></aside>

<div data-pagefind-ignore class="search-shell">
  <h1 class="search-title">{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}
  <div id="search"></div>
</div>

<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      translations: {
        placeholder: "搜尋卡片或文章…",
        clear_search: "清除",
        load_more: "載入更多",
        search_label: "站內搜尋",
        filters_label: "篩選",
        zero_results: "找不到 [SEARCH_TERM] 相關內容",
        many_results: "[COUNT] 筆結果符合 [SEARCH_TERM]",
        one_result: "1 筆結果符合 [SEARCH_TERM]",
        alt_search: "找不到 [SEARCH_TERM]，以下是 [DIFFERENT_TERM] 的結果",
        search_suggestion: "找不到 [SEARCH_TERM]。試試：",
        searching: "搜尋 [SEARCH_TERM]…"
      }
    });

    /*
      桌面寬時把 .pagefind-ui__filter-panel 搬進左欄 slot；
      縮窄視窗時搬回 pagefind 原本的 drawer，讓它以原生位置顯示。
      門檻與 CSS @media 對齊（1400px）。
    */
    var slot = document.querySelector('.search-filter-slot');
    var mql  = window.matchMedia('(min-width: 1400px)');
    var filter, drawer, drawerParent;

    function place() {
      if (!filter || !drawer) return;
      if (mql.matches) {
        if (filter.parentElement !== slot) slot.appendChild(filter);
      } else {
        if (filter.parentElement !== drawer) drawer.insertBefore(filter, drawer.firstChild);
      }
    }

    function waitAndInit() {
      filter = document.querySelector('.pagefind-ui__filter-panel');
      drawer = document.querySelector('.pagefind-ui__drawer');
      if (!filter || !drawer) { setTimeout(waitAndInit, 100); return; }
      drawerParent = drawer;
      place();
      reorderFilters();
      mql.addEventListener('change', place);
    }
    waitAndInit();

    /*
      pagefind 預設把 filter-block 以 filter key 的字母順序排（tag < type），
      但 type 選項比 tag 少、先顯示短清單找起來較輕鬆。
      讓 filter-block 按自訂順序：type → tag。
    */
    function reorderFilters() {
      if (!filter) return;
      var blocks = filter.querySelectorAll('.pagefind-ui__filter-block');
      var desiredOrder = ['type', 'tag'];
      var byKey = {};
      blocks.forEach(function (b) {
        var name = b.querySelector('.pagefind-ui__filter-name');
        if (!name) return;
        var key = name.textContent.trim().toLowerCase();
        byKey[key] = b;
      });
      // 依 desiredOrder 把元素重新 append 到 filter 最後面
      desiredOrder.forEach(function (k) {
        if (byKey[k]) filter.appendChild(byKey[k]);
      });
    }
  });
</script>

<style>
  /*
    高度變數：鎖定右欄 H1 / 搜尋框 / 結果頂間距的視覺單位。
    左欄 slot 的 padding-top 直接引用、不會錯位。
  */
  body.page-search {
    --search-title-h: 64px;
    --search-form-h: 68px;  /* pagefind input 64px + 上下 border 各 2px */
    --search-gap: 20px;     /* 搜尋框下緣到結果上緣的空白（pagefind drawer margin-top） */
  }

  .search-title {
    height: var(--search-title-h);
    line-height: var(--search-title-h);
    margin: 0;
  }

  /* pagefind input 自然高度 = 64px * scale；把 scale 設成 1.0 讓結果剛好 68px。 */
  .search-shell {
    --pagefind-ui-scale: 1.0;
  }

  /* filter slot 的 offset parent。 */
  body.page-search main#main-content {
    position: relative;
  }

  /* 拿掉 filter-block 間的分隔線（pagefind 預設 border-bottom 2px）。 */
  .pagefind-ui__filter-block { border-bottom: 0 !important; }

  /* filter-panel 本身是 <fieldset>，依賴 pagefind 外層 .pagefind-ui--reset 清掉 UA 樣式。
     JS 把它搬到 aside 後，reset 不再是 ancestor，UA border 顯現。直接在 slot 內壓掉。 */
  .search-filter-slot fieldset {
    border: 0;
    padding: 0;
    margin: 0;
  }


  /*
    Breakpoint 計算：
      main 寬度 70ch ≈ 720px
      filter 寬 400px + gap 32px = 432px
      body 左右 padding 各 64px
      → viewport ≥ 720 + 432*2 + 128 ≈ 1712 才能左右都對稱放下
      → 若只要左側放下（允許溢出到 body padding 內）：viewport ≥ 1280
      → 取 1400px 當安全門檻
  */

  /* 預設（含 mobile / 桌面窄）：slot 隱藏；filter 留在 pagefind 的 drawer 原位。 */
  .search-filter-slot { display: none; }

  /* 桌面寬（≥1400px）：slot 顯示於 main 左外側；pagefind 原生 filter-panel 藏起來。
     （但 JS 會把 filter-panel 搬進 slot，所以 !important 只是防禦殘留樣式。） */
  @media (min-width: 1400px) {
    .search-filter-slot {
      display: block;
      position: absolute;
      top: 0;
      right: calc(100% + 2rem);
      width: 400px;
      padding-top: calc(var(--search-title-h) + var(--search-form-h) + var(--search-gap));
      padding-left: 0;
      padding-right: 0;
      padding-bottom: 1rem;
      min-height: 240px;
      box-sizing: border-box;
    }
  }
</style>
{{ end }}
