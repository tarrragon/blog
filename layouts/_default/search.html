{{ define "main" }}
<div data-pagefind-ignore class="search-shell">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}

  <link href="{{ "pagefind/pagefind-ui.css" | relURL }}" rel="stylesheet">

  <style>
    /* 搜尋頁專屬：把主欄寬限放寬，讓 filter 能擺在結果旁邊而不擠壓。 */
    body.page-search main#main-content {
      max-width: min(1200px, 95vw);
      margin-left: auto;
      margin-right: auto;
    }

    /* Mobile toggle 按鈕預設存在；桌面隱藏。 */
    .search-filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      margin: 0.75rem 0 0.25rem;
      padding: 0.45rem 0.9rem;
      border: 1px solid currentColor;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }

    @media (min-width: 768px) {
      /*
        Desktop layout：
          [ filter | H1       ]
          [ filter | 搜尋框    ]
          [ filter | 結果列表  ]

        filter 是左側獨立 column、跨三列；右側 column 由上而下堆疊
        H1、搜尋框、結果。

        實作上，pagefind-ui.js 產生的 DOM 是
          #search > .pagefind-ui > .pagefind-ui__form
                                > .pagefind-ui__drawer > .pagefind-ui__filter-panel
                                                       > .pagefind-ui__results-area
        要讓 filter-panel（深在 DOM 底層）視覺上與 H1（淺在 DOM 上層）
        出現在同一個 grid 裡，讓中間三層（#search、.pagefind-ui、
        .pagefind-ui__drawer）走 display:contents，把子孫提升進 .search-shell
        的 grid。

        Pagefind 的 svelte class 在 CSS 裡常以 .x.x 雙寫形式出現
        （specificity = 30）壓過一般選擇器。我們也用雙寫把 specificity
        追平，再靠 pagefind-ui.css 先載入、這個 style block 晚載入取勝。
      */
      .search-shell {
        display: grid;
        grid-template-columns: 240px 1fr;
        grid-template-areas:
          "filter title"
          "filter form"
          "filter results";
        gap: 1.5rem 2rem;
        align-items: start;
      }
      .search-shell > h1 {
        grid-area: title;
        margin: 0;
      }
      .search-shell > #search,
      .search-shell #search > .pagefind-ui.pagefind-ui,
      .search-shell .pagefind-ui__drawer.pagefind-ui__drawer {
        display: contents;
      }
      .search-shell .pagefind-ui__form.pagefind-ui__form {
        grid-area: form;
      }
      .search-shell .pagefind-ui__filter-panel.pagefind-ui__filter-panel {
        grid-area: filter;
        min-width: 0;
        margin-top: 0;
        flex: none;
        position: sticky;
        top: 1rem;
      }
      .search-shell .pagefind-ui__results-area.pagefind-ui__results-area {
        grid-area: results;
        min-width: 0;
        margin-top: 0;
        flex: none;
      }

      /* Toggle 按鈕在桌面沒用。 */
      .search-filter-toggle { display: none; }
    }

    @media (max-width: 767px) {
      /* Mobile：filter 與結果互斥顯示；預設顯示結果，按 toggle 後顯示 filter。 */
      .search-shell:not(.mobile-filters-open) #search .pagefind-ui__filter-panel {
        display: none;
      }
      .search-shell.mobile-filters-open #search .pagefind-ui__results-area {
        display: none;
      }
    }
  </style>

  <button type="button" class="search-filter-toggle"
          data-search-filter-toggle
          aria-pressed="false">
    <span class="label-to-filters">⇄ 切換到篩選</span>
    <span class="label-to-results" hidden>⇄ 切換到結果</span>
  </button>

  <div id="search"></div>

  <script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: false,
        translations: {
          placeholder: "搜尋卡片或文章…",
          clear_search: "清除",
          load_more: "載入更多",
          search_label: "站內搜尋",
          filters_label: "篩選",
          zero_results: "找不到 [SEARCH_TERM] 相關內容",
          many_results: "[COUNT] 筆結果符合 [SEARCH_TERM]",
          one_result: "1 筆結果符合 [SEARCH_TERM]",
          alt_search: "找不到 [SEARCH_TERM]，以下是 [DIFFERENT_TERM] 的結果",
          search_suggestion: "找不到 [SEARCH_TERM]。試試：",
          searching: "搜尋 [SEARCH_TERM]…"
        }
      });
    });

    // Mobile toggle：在 filter 視圖與結果視圖之間切換。
    document.addEventListener('click', function (ev) {
      var btn = ev.target.closest('[data-search-filter-toggle]');
      if (!btn) return;
      var shell = document.querySelector('.search-shell');
      var open = shell.classList.toggle('mobile-filters-open');
      btn.setAttribute('aria-pressed', open ? 'true' : 'false');
      btn.querySelector('.label-to-filters').hidden = open;
      btn.querySelector('.label-to-results').hidden = !open;
    });
  </script>
</div>
{{ end }}
