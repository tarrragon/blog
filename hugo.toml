# 基本設定
baseURL = 'https://tarrragon.github.io/blog/'
theme = 'hugo-bearcub'
copyright = 'Tarragon (CC BY 4.0)'
defaultContentLanguage = 'zh-tw'

# front matter 的 `date: YYYY-MM-DD` 補時間時所用的時區。未設定時 Hugo 以 UTC
# 解讀，當天日期的文章在台北時間 08:00 前 build 會落在未來、被 buildFuture=false
# 排除掉（CI 跑在 UTC）。
timeZone = 'Asia/Taipei'

# 產生 robots.txt 以利於 SEO
enableRobotsTXT = true

# 摘要設定
summaryLength = 200  # 摘要字數限制

# 設定語法高亮
[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# 多語言模式設定
[languages]
  [languages.zh-tw]
    title = 'Tarragon'
    languageName = 'zh-TW 🇹🇼'
    LanguageCode = 'zh-TW'
    contentDir = 'content'
    [languages.zh-tw.params]
      madeWith = '使用 [hugo](https://gohugo.io/) 製作'

# 導航選單設定
[menu]

  [[menu.main]]
    name = "搜尋"
    url = "/search/"
    weight = 1

  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 5

  [[menu.main]]
    name = "標籤"
    url = "/tags/"
    weight = 10

  [[menu.main]]
    name = "Now"
    url = "/now/"
    weight = 15


[params]
  # 網站描述
  description = '一個部落格'

  # 網站標題
  title = 'Tarragon'

  # 日期格式
  dateFormat = '2006-01-02'

  # 主題樣式 (original 或 herman)
  themeStyle = 'herman'

  # 自動產生社群媒體卡片
  generateSocialCard = true

  # 免伺服器流量統計 beacon：部署 Apps Script web app 後，把 /exec 網址填進來即啟用。
  # 留空字串代表停用（partial 不會輸出任何 script）。設定說明見 posts 的 apps-script 流量統計實作文。
  analyticsBeacon = 'https://script.google.com/macros/s/AKfycbxBf3-Equ943Q-iKL09bzz8mn5AiU-C3Rkl1BA4A0ZcS7Q95oAnFl7Ds_Ig-SVvUxTF/exec'

  # 作者資訊
  [params.author]
    name = 'tarragon'

#永久連結
[permalinks]
  posts = "/posts/:slug/"
  work-log = "/work-log/:slug/"
  record = "/record/:slug/"
  other = "/other/:slug/"