name: md-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  md-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: scripts/mdtools/go.mod
          cache-dependency-path: scripts/mdtools/go.sum

      - name: Build mdtools
        run: |
          mkdir -p bin
          (cd scripts/mdtools && go build -o ../../bin/mdtools .)

      # The lint and cards rules below are only as trustworthy as the code
      # deciding which files they apply to. Run the unit tests that pin that
      # scope before letting the tool pass judgment on content.
      - name: Test mdtools
        run: (cd scripts/mdtools && go vet ./... && go test ./...)

      - name: mdtools fmt --fix + auto-commit
        run: |
          ./bin/mdtools fmt --fix content/

          if git diff --quiet; then
            echo "No formatting changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/
            git commit -m "style: mdtools fmt auto-fix"
            git push
            echo "::notice::Auto-fixed formatting and pushed"
          fi

      - name: mdtools lint
        run: ./bin/mdtools lint content/

      - name: mdtools cards
        run: ./bin/mdtools cards content/
