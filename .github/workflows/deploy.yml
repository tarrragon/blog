name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 把 repo checkout 下來（包含子模組）
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive # ⬅️ 重要：處理子模組

      # 2. 安裝 Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.148.2"
          extended: true

      # 3. 編譯網站
      - name: Build
        id: hugo-build
        run: hugo --minify 2>&1 | tee hugo-build-output.txt
        continue-on-error: true

      # 3.1 Build 失敗時，讓 Claude 自動除錯並修復
      - name: Claude Debug on Build Failure
        if: steps.hugo-build.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Hugo build failed. Here is the error output:

            $(cat hugo-build-output.txt)

            Please analyze the error, find the problematic file(s), fix the YAML front matter or content issue, and commit the fix.
          claude_args: "--max-turns 10"

      # 3.2 如果原本 build 就失敗且 Claude 沒修好，終止流程
      - name: Fail if build was not fixed
        if: steps.hugo-build.outcome == 'failure'
        run: |
          echo "Retrying Hugo build after Claude fix..."
          hugo --minify

      # 3.3 產生 Pagefind 搜尋索引（三份、對應 search 頁的 scope filter）
      # 對齊 Makefile site target — 三份 index 各自是該 mode 的全集（#65 multi-index）
      - name: Build Pagefind search indexes
        run: |
          npx -y pagefind --site public --root-selector main
          npx -y pagefind --site public --root-selector "article.article-content > h1" --output-subdir pagefind-title
          npx -y pagefind --site public --root-selector ".article-body" --output-subdir pagefind-content

      # 4. 上傳編譯好的檔案
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
